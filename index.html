<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Πάντα">
<title>Πάντα — Τα πάντα σου. Πάντα.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:ital,opsz,wght@1,7..72,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F4F9; 
  --card: rgba(255, 255, 255, 0.85); 
  --card-solid: #FFFFFF;
  --card2: rgba(255, 255, 255, 0.5);
  --ink: #09090B; 
  --ink2: #52525B; 
  --ink3: #A1A1AA;
  --line: rgba(9, 9, 11, 0.08); 
  --line2: rgba(9, 9, 11, 0.15);
  --a1: #4F46E5; --a2: #E11D48;
  --grad: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
  --grad-hover: linear-gradient(135deg, #2563EB 0%, #7C3AED 50%, #DB2777 100%);
  --accent: #6366F1; --accent-soft: #EEF2FF; --accent-text: #4338CA;
  --good: #059669; --good-soft: #D1FAE5; 
  --warn: #D97706; --warn-soft: #FEF3C7;
  --danger: #E11D48; --danger-soft: #FFE4E6; 
  --track: #E4E4E7;
  --r: 28px; --ri: 18px;
  --sh-sm: 0 4px 12px -2px rgba(0,0,0,0.05);
  --sh: 0 12px 32px -8px rgba(0,0,0,0.1), 0 4px 12px -4px rgba(0,0,0,0.06);
  --sh-lg: 0 32px 64px -16px rgba(0,0,0,0.15);
  --blur: blur(32px) saturate(200%);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background-color: var(--bg);
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: calc(120px + env(safe-area-inset-bottom));
  font-feature-settings: "cv02", "cv03", "cv11";
  position: relative;
  overflow-x: hidden;
}
/* Peak Ambient Animated Background */
body::before {
  content: ''; position: fixed; inset: -20%; z-index: -1;
  background: 
    radial-gradient(circle at 10% 40%, rgba(59, 130, 246, 0.08), transparent 45%),
    radial-gradient(circle at 90% 20%, rgba(124, 58, 237, 0.1), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(219, 39, 119, 0.08), transparent 50%);
  filter: blur(80px);
  animation: breathe 18s ease-in-out infinite alternate;
}
@keyframes breathe { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.05) translate(2%, 2%); } }

button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
button:focus-visible, input:focus-visible, select:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:12px; }
input, select { font-family:inherit; font-size:14.5px; color:var(--ink); }
svg { display:block; flex:0 0 auto; }
.app { max-width: 1440px; margin: 0 auto; padding: 0 24px; }
@media(prefers-reduced-motion:reduce){ *{transition:none!important; animation:none!important;} }

/* ===== Top bar ===== */
.top { display:flex; align-items:center; gap:16px; padding:32px 0 24px; }
.brand { font-weight:800; font-size:24px; letter-spacing:-.04em; }
.brand .dot { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.brand-tag { font-family:'Literata',serif; font-style:italic; font-size:14px; color:var(--ink3); display:none; font-weight:500; }
@media(min-width:768px){ .brand-tag { display:inline; margin-left:12px; } }
.top .spacer { flex:1; }
.profiles { display:flex; gap:8px; align-items:center; }
.avatar { width:42px; height:42px; border-radius:50%; background:var(--card-solid); color:var(--ink); font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); transition:.3s cubic-bezier(.25,1,.5,1); box-shadow:var(--sh-sm); }
.avatar.active { background:var(--grad); color:#fff; border-color:transparent; box-shadow:0 8px 24px rgba(124,58,237,.35); }
.avatar.add { background:transparent; border:2px dashed var(--line2); color:var(--ink3); box-shadow:none; }
.iconbtn { width:42px; height:42px; border-radius:50%; background:var(--card-solid); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--ink2); transition:.2s; box-shadow:var(--sh-sm); }
.iconbtn:hover { color:var(--ink); transform:translateY(-2px); box-shadow:var(--sh); }
.lang { font-size:13px; font-weight:700; color:var(--ink2); background:var(--card-solid); border:1px solid var(--line); border-radius:999px; padding:10px 18px; letter-spacing:.04em; box-shadow:var(--sh-sm); transition:.2s; }
.lang:hover { color:var(--ink); transform:translateY(-2px); box-shadow:var(--sh); }

/* ===== Hero ===== */
.hero { display:flex; align-items:center; gap:24px; padding:12px 0 28px; }
.hero h1 { font-size:clamp(22px, 4vw, 32px); font-weight:800; letter-spacing:-.03em; line-height:1.2; }
.hero .sub { 
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(90deg, rgba(79,70,229,0.08), rgba(219,39,119,0.08));
  padding: 8px 16px; border-radius: 999px;
  color: #4F46E5; font-weight: 700; font-size: 14.5px;
  border: 1px solid rgba(79,70,229,0.15);
  box-shadow: 0 4px 16px rgba(79,70,229,0.1);
  margin-top: 12px;
}
.hero .sub svg { opacity: 0.8; }
.ringwrap { position:relative; width:100px; height:100px; flex:0 0 auto; filter:drop-shadow(0 12px 24px rgba(124,58,237,.25)); margin-left:auto; }
.ringwrap .txt { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ringwrap b { font-size:22px; font-weight:800; letter-spacing:-.02em; }
.ringwrap span { font-size:10px; color:var(--ink3); text-transform:uppercase; letter-spacing:.1em; font-weight:700; margin-top:2px; }

/* ===== Desktop Grid Layout ===== */
.dashboard { display: grid; grid-template-columns: 1fr; gap: 28px; }
@media(min-width: 1024px) { 
  .dashboard { grid-template-columns: 1.6fr 1.1fr; align-items: start; } 
}

/* ===== Tabs ===== */
.tabs { display:flex; gap:6px; background:var(--line); border-radius:24px; padding:6px; margin:0 0 32px; backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); max-width: max-content; }
.tabs button { padding:14px 24px; border-radius:18px; font-weight:600; font-size:14.5px; color:var(--ink2); display:flex; align-items:center; gap:10px; transition:all .3s cubic-bezier(.25,1,.5,1); }
.tabs button.on { background:var(--card-solid); color:var(--ink); box-shadow:var(--sh-sm); }
.tabs button .lbl { white-space:nowrap; }
@media(max-width:800px){
  .tabs { position:fixed; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); margin:0; z-index:60; max-width:none; background:rgba(255,255,255,.85); border:1px solid rgba(255,255,255,0.8); border-radius:32px; box-shadow:var(--sh-lg); padding:10px; }
  .tabs button { flex-direction:column; gap:6px; padding:12px 4px; border-radius:22px; color:var(--ink3); flex:1; }
  .tabs button .lbl { font-size:11px; font-weight:700; }
  .tabs button.on { background:var(--accent-soft); box-shadow:none; color:var(--accent-text); }
}

/* ===== Cards & Containers ===== */
#view { animation:vin .4s cubic-bezier(.25,1,.5,1); }
@keyframes vin { from{opacity:0; transform:translateY(15px);} to{opacity:1; transform:none;} }
.card { background:var(--card); border:1px solid rgba(255,255,255,1); border-radius:var(--r); box-shadow:var(--sh); padding:24px; margin-bottom:20px; backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); }
.sec-h { display:flex; align-items:center; gap:12px; margin:36px 0 16px; flex-wrap:wrap; }
.sec-h:first-child { margin-top: 0; }
.sec-h h2 { font-size:18px; font-weight:800; letter-spacing:-.02em; display:flex; align-items:center; gap:10px; }
.sec-h h2 svg { color:var(--ink3); }
.sec-h .hint { font-size:14px; color:var(--ink3); font-weight:500; }
.sec-h .right { margin-left:auto; font-size:14px; font-weight:700; color:var(--accent-text); display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px; background:var(--accent-soft); transition:.2s; box-shadow:var(--sh-sm); }
.sec-h .right:hover { transform:translateY(-2px); box-shadow:var(--sh); filter:brightness(.95); }

/* ===== Quick Notes ===== */
.notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 28px; }
.note-item { background: linear-gradient(145deg, #FEF9C3, #FEF08A); border-radius: 20px; padding: 20px; box-shadow: var(--sh-sm); position: relative; transition: .3s; cursor: pointer; border: 1px solid rgba(253,224,71,0.5); }
.note-item:hover { transform: translateY(-4px) rotate(-2deg); box-shadow: var(--sh); }
.note-item.done { opacity: 0.5; text-decoration: line-through; filter: grayscale(50%); }
.note-item .del-n { position: absolute; top: 12px; right: 12px; color: rgba(0,0,0,0.3); padding: 6px; border-radius: 50%; opacity: 0; transition: .2s; }
.note-item:hover .del-n { opacity: 1; }
.note-item .del-n:hover { background: rgba(0,0,0,0.1); color: var(--danger); }
.note-text { font-size: 15px; font-weight: 600; color: #854D0E; line-height: 1.4; }
.n-add { display: flex; gap: 10px; }
.n-add input { flex: 1; background: var(--card-solid); border: 1px solid var(--line); border-radius: 16px; padding: 16px 20px; font-weight: 500; font-size:15px; transition:.3s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
.n-add input:focus { border-color: var(--a1); box-shadow: 0 0 0 4px rgba(99,102,241,.15); }

/* ===== NEW Clean Quick Add Bar ===== */
.qa-container { background: var(--card-solid); border: 1px solid var(--line2); border-radius: 24px; padding: 6px; box-shadow: var(--sh); display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.qa-main { display: flex; align-items: center; }
.qa-main input[type="text"] { flex: 1; border: none; background: transparent; padding: 18px 20px; font-size: 17px; font-weight: 600; outline: none; }
.qa-main input[type="text"]::placeholder { color: var(--ink3); font-weight: 500; }
.qa-tools { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 14px 14px; align-items: center; background: var(--bg); border-radius: 18px; border: 1px solid var(--line); }
.qa-item { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 110px; }
.qa-lbl { font-size: 11px; font-weight: 800; color: var(--ink3); text-transform: uppercase; letter-spacing: .08em; padding-left: 4px; }
.qa-tools select, .qa-tools input[type="time"], .qa-tools input[type="date"] { 
  width: 100%; border: 1px solid var(--line); background: var(--card-solid); border-radius: 12px; padding: 10px 12px; font-size: 13.5px; font-weight: 600; color: var(--ink2); cursor: pointer; transition: .2s; box-shadow: var(--sh-sm); 
}
.qa-tools select:hover, .qa-tools input:hover { border-color: var(--ink3); }
.qa-tools select { appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23A1A1AA' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 28px; }
.btn-p { background: var(--grad); color: #fff; font-weight: 800; border-radius: 14px; padding: 14px 24px; font-size: 15px; transition: .3s; box-shadow: 0 8px 20px rgba(124,58,237,.3); display: flex; align-items: center; justify-content: center; gap: 8px; flex: 0 0 auto; height: 100%; align-self: flex-end; }
.btn-p:hover { background: var(--grad-hover); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(124,58,237,.45); }
.btn-p:active { transform: scale(.97); }

/* ===== Tasks ===== */
.tlist { padding: 12px 16px; }
.task { display:flex; align-items:center; gap:16px; padding:18px 12px; border-bottom:1px solid var(--line); transition:all .3s cubic-bezier(.25,1,.5,1); border-radius:18px; }
.task:last-child { border-bottom: none; }
.task:hover { background:var(--card-solid); box-shadow:var(--sh); transform:scale(1.02); z-index: 2; position: relative; }
.tick { width:30px; height:30px; border-radius:50%; border:2px solid var(--line2); flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:transparent; transition:.2s; }
.tick:hover { border-color:var(--a1); transform:scale(1.1); }
@keyframes pop { 0%{transform:scale(.5);} 60%{transform:scale(1.2);} 100%{transform:scale(1);} }
.task.done .tick { background:var(--grad); border-color:transparent; color:#fff; animation:pop .4s cubic-bezier(.25,1,.5,1); box-shadow:0 6px 16px rgba(124,58,237,.35); }
.task .body { flex:1; min-width:0; cursor:pointer; }
.task .t { font-weight:700; font-size:16.5px; letter-spacing:-.01em; display:flex; align-items:center; gap:10px; }
.task .t .pd { width:10px; height:10px; border-radius:50%; flex:0 0 auto; }
.task.done .t { text-decoration:line-through; color:var(--ink3); font-weight:600; }
.task .m { display:flex; gap:12px; align-items:center; margin-top:8px; flex-wrap:wrap; }
.badge { font-size:12px; font-weight:800; padding:6px 14px; border-radius:999px; letter-spacing:.02em; }
.mins { font-size:13px; color:var(--ink3); font-weight:700; display:flex; align-items:center; gap:6px; background:var(--card-solid); border:1px solid var(--line); padding:4px 10px; border-radius:10px; }
.late { font-size:12px; font-weight:800; color:var(--danger); background:var(--danger-soft); padding:6px 12px; border-radius:999px; }
.play { width:44px; height:44px; border-radius:50%; background:var(--card-solid); color:var(--ink); flex:0 0 auto; display:flex; align-items:center; justify-content:center; transition:.2s; border:1px solid var(--line); box-shadow:var(--sh-sm); }
.play:hover { background:var(--grad); color:#fff; border-color:transparent; box-shadow:0 8px 24px rgba(124,58,237,.4); transform:translateY(-2px); }
.del { color:var(--ink3); padding:12px; opacity:0; transition:.2s; border-radius:14px; }
.task:hover .del { opacity: .6; }
.del:hover { opacity:1 !important; color:var(--danger); background:var(--danger-soft); }

/* ===== Unified Timeline (Space/Time) ===== */
.timeline { position: relative; padding-left: 24px; margin-top: 16px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 12px; bottom: 12px; width: 3px; background: var(--line2); border-radius: 3px; }
.t-item { position: relative; padding-bottom: 28px; }
.t-item:last-child { padding-bottom: 0; }
.t-item::before { content: ''; position: absolute; left: -25px; top: 4px; width: 16px; height: 16px; border-radius: 50%; background: var(--card-solid); border: 4px solid var(--accent); box-shadow: 0 0 0 5px var(--card); z-index: 2; }
.t-item.is-task::before { border-color: var(--warn); }
.t-time { font-size: 13.5px; font-weight: 800; color: var(--accent-text); margin-bottom: 6px; letter-spacing: -0.01em; display:flex; align-items:center; gap:8px; }
.t-item.is-task .t-time { color: var(--warn); }
.t-content { background: var(--card-solid); border: 1px solid var(--line); border-radius: 18px; padding: 16px 20px; box-shadow: var(--sh-sm); font-weight: 700; font-size: 15px; display:flex; flex-direction:column; gap:6px; transition:.2s; cursor:default; }
.t-item.is-task .t-content { border-color: var(--warn-soft); cursor:pointer; }
.t-item.is-task .t-content:hover { transform:translateY(-2px); box-shadow:var(--sh); }
.t-content .t-sub { font-size:12px; color:var(--ink3); font-weight:600; display:flex; align-items:center; gap:6px; }

/* ===== Deadlines (Home Page) ===== */
.dl-mini { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--card-solid); border-radius: 20px; border: 1px solid var(--line); box-shadow: var(--sh-sm); margin-bottom: 14px; transition: .3s; cursor:pointer; }
.dl-mini:hover { transform: translateY(-3px); box-shadow: var(--sh); }
.dl-mini .d-days { width: 60px; height: 60px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; line-height: 1; }
.dl-mini .d-days span { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-top: 4px; opacity: .8; }
.dl-mini .d-title { font-weight: 800; font-size: 15.5px; margin-bottom: 6px; }

/* ===== Empty States ===== */
.empty { color:var(--ink3); font-size:15px; text-align:center; padding:56px 16px; }
.empty b { display:block; font-size:18px; color:var(--ink2); margin-bottom:8px; font-weight:800; }
.alldone { text-align:center; padding:56px 16px; }
.alldone .aic { width:80px; height:80px; border-radius:50%; background:var(--grad); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; box-shadow:0 20px 48px rgba(124,58,237,.4); }
.alldone b { display:block; font-size:24px; font-weight:800; letter-spacing:-.02em; }
.alldone span { font-size:16px; color:var(--ink2); margin-top:8px; display:block; font-weight:600; }

/* ===== Stats / Week View ===== */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
.stat { background:var(--card-solid); border:1px solid var(--line); border-radius:28px; padding:28px; box-shadow:var(--sh); position:relative; overflow:hidden; }
.stat b { font-size:32px; font-weight:800; letter-spacing:-.04em; display:block; font-variant-numeric:tabular-nums; }
.stat span { font-size:12.5px; color:var(--ink3); font-weight:800; text-transform:uppercase; letter-spacing:.1em; margin-top:6px; display:block; }
.stat .si { position:absolute; top:24px; right:24px; color:var(--ink3); opacity:.2; }
.wk-nav { display:flex; align-items:center; gap:12px; margin-left:auto; }
.wk-nav .arr { width:44px; height:44px; border-radius:16px; background:var(--card-solid); border:1px solid var(--line); color:var(--ink2); display:flex; align-items:center; justify-content:center; transition:.2s; box-shadow:var(--sh-sm); }
.wk-nav .arr:hover { border-color:var(--line2); color:var(--ink); transform:translateY(-2px); box-shadow:var(--sh); }
.wk-nav .cur { font-weight:800; font-size:15px; color:var(--ink2); min-width:130px; text-align:center; }
.week { display:grid; grid-template-columns:repeat(7,1fr); gap:20px; align-items:start; }
@media(max-width:1024px){
  .week { display:flex; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:24px; margin:0 -24px; padding-left:24px; padding-right:24px; scrollbar-width:none; }
  .week::-webkit-scrollbar { display:none; }
  .day { min-width:85vw; scroll-snap-align:center; }
}
.day { background:var(--card); border:1px solid rgba(255,255,255,1); border-radius:32px; padding:24px; box-shadow:var(--sh); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); display:flex; flex-direction:column; gap:16px; }
.day.today { border-color:transparent; box-shadow:0 0 0 4px var(--a1), var(--sh-lg); }
.day-h { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
.day-h .dn { font-size:32px; font-weight:800; letter-spacing:-.04em; font-variant-numeric:tabular-nums; }
.day.today .dn { background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
.day-h .dw { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink3); font-weight:800; line-height:1.4; }
.day-h .dadd { margin-left:auto; width:40px; height:40px; border-radius:14px; background:var(--card-solid); border:1px solid var(--line); color:var(--ink3); display:flex; align-items:center; justify-content:center; transition:.2s; box-shadow:var(--sh-sm); }
.day-h .dadd:hover { border-color:var(--a1); color:var(--accent-text); background:var(--accent-soft); transform:translateY(-2px); box-shadow:var(--sh); }

/* ===== Smart Routines (Flows) ===== */
.flows { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:24px; }
.flow { background:var(--card); border:1px solid rgba(255,255,255,1); border-radius:32px; padding:32px; text-align:left; transition:.4s cubic-bezier(.25,1,.5,1); box-shadow:var(--sh); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); cursor:pointer; position:relative; overflow:hidden; }
.flow::after { content:''; position:absolute; top:0; right:0; bottom:0; width:6px; background:var(--grad); opacity:0; transition:.4s; }
.flow:hover { transform:translateY(-8px); box-shadow:var(--sh-lg); border-color:transparent; }
.flow:hover::after { opacity:1; }
.flow .fi { width:64px; height:64px; border-radius:20px; background:var(--card-solid); color:var(--accent-text); display:flex; align-items:center; justify-content:center; box-shadow:var(--sh-sm); border:1px solid var(--line); font-size: 28px; }
.flow b { display:block; font-size:20px; font-weight:800; margin-top:24px; letter-spacing:-.02em; }
.flow span { font-size:15px; color:var(--ink2); display:block; margin-top:8px; line-height:1.6; font-weight:600; }
.flow-steps { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.f-step { font-size: 13.5px; font-weight: 700; color: var(--ink2); display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.04); padding: 10px 14px; border-radius: 12px; }

/* ===== Stats / Subs Charts ===== */
.chart { display:flex; gap:14px; align-items:flex-end; height:220px; padding:16px 12px 0; }

.sub-row { display:flex; align-items:center; gap:24px; padding:24px 16px; border-bottom:1px solid var(--line); }

.sub-ico { width:60px; height:60px; border-radius:20px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; box-shadow:var(--sh-sm); border:1px solid rgba(255,255,255,0.8); }
.sub-row .n { font-weight:800; font-size:18px; letter-spacing:-.015em; }
.sub-row .d { font-size:14px; color:var(--ink3); font-weight:600; margin-top:6px; }
.sub-row .amt { margin-left:auto; font-weight:800; font-size:22px; text-align:right; font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
.sub-row .amt small { display:block; font-size:13px; font-weight:700; color:var(--ink3); margin-top:4px; }

.mini { position:fixed; left:50%; transform:translateX(-50%); bottom:calc(100px + env(safe-area-inset-bottom)); z-index:70; display:flex; align-items:center; gap:16px; background:rgba(9,9,11,.9); backdrop-filter:blur(40px) saturate(2); -webkit-backdrop-filter:blur(40px) saturate(2); color:#fff; border-radius:999px; padding:14px 16px 14px 28px; box-shadow:var(--sh-lg); max-width:min(92vw,500px); cursor:pointer; animation:vin .4s cubic-bezier(.25,1,.5,1); border:1px solid rgba(255,255,255,0.15); }

/* ============ Grammar Engine ============ */
function vocative(name) {
  if (!name) return "";
  let first = name.split(" ")[0];
  if (first.endsWith("ος")) {
    const exceptions = ["Νίκος", "Γιώργος", "Πέτρος", "Σπύρος", "Στέλιος", "Χρήστος", "Τάσος", "Πάνος", "Παύλος"];
    if (exceptions.includes(first)) return first.slice(0, -1);
    return first.slice(0, -2) + "ε";
  }
  if (first.endsWith("ης") || first.endsWith("ας")) return first.slice(0, -1);
  return first;
}

/* ============ Seeds ============ */
function seeds(p,lang){
  const el=lang==="el";
  const D=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
  const hist=[[4,50,0],[3,75,1],[2,40,0],[1,95,2],[1,30,3]].map(([b,min,a])=>({d:D(-b),min,a}));
  
  if(p==="adult") return{hist,
    areas:["Advon Media", "Frontend & Dev", "Health & Gym", "Personal"],
    notes:[{id:++uid, t:el?"Follow-up με 2 dental clinics":"Follow-up with 2 dental clinics", done:false}],
    tasks:[{t:el?"Επικοινωνία B2B (Κλινικές Λονδίνου)":"B2B Outreach (London Clinics)",a:0,min:45,d:D(0),time:"10:00",p:2},
      {t:"Vite / React Architecture Refactor",a:1,min:90,d:D(0),time:"",p:1},
      {t:"Upper Body Split (Gym)",a:2,min:60,d:D(1),time:"18:00",p:0}],
    slots:[{n:el?"Deep Work (Κώδικας)":"Deep Work (Code)",days:[0,1,2,3,4],time:"09:00–12:00"},
           {n:"Client Calls / Admin",days:[0,1,2,3,4],time:"13:00–15:00"},
           {n:el?"Προπόνηση":"Gym",days:[0,2,4],time:"18:00–19:30"}],
    subs:[{n:"Vercel Pro",c:20,day:5,cat:"serv",cy:"m"},{n:"Contentful",c:45,day:12,cat:"serv",cy:"m"},{n:"Cosmote Mobile",c:25,day:15,cat:"serv",cy:"m"},{n:"Gym",c:35,day:1,cat:"sport",cy:"m"}],
    dls:[{t:el?"Παράδοση B2B Portfolio":"Deliver B2B Portfolio",a:1,d:D(5)}]};
    
  if(p==="student")return{hist,
    areas:el?["Μαθηματικά","Φυσική","Βιολογία","Αγγλικά"]:["Math","Physics","Biology","English"],
    tasks:[{t:el?"Ασκήσεις άλγεβρας":"Algebra exercises",a:0,min:45,d:D(0),time:"",p:2}],
    slots:[{n:el?"Σχολείο":"School",days:[0,1,2,3,4],time:"08:15–14:00"}],
    subs:[{n:el?"Φροντιστήριο":"Tutoring",c:120,day:1,cat:"edu",cy:"m"}],
    dls:[{t:el?"Διαγώνισμα Φυσικής":"Physics exam",a:1,d:D(9)}]};
    
  return{hist,
    areas:el?["Project A","Στατιστική","Σπίτι"]:["Project A","Stats","Home"],
    tasks:[{t:el?"Διάβασμα / Έρευνα":"Study / Research",a:0,min:60,d:D(0),time:"",p:1}],
    slots:[{n:el?"Δουλειά / Σχολή":"Work / Uni",days:[0,1,2,3,4],time:"09:00–15:00"}],
    subs:[{n:"Netflix",c:13,day:3,cat:"serv",cy:"m"}],
    dls:[{t:el?"Παράδοση Εργασίας":"Project Delivery",a:0,d:D(14)}]};
}

/* ============ Shared ============ */
function areaBadge(ai){ const [fg,bg]=AREA_COLORS[ai%AREA_COLORS.length];
  return `<span class="badge" style="color:${fg};background:${bg}">${esc(P().areas[ai]||"—")}</span>`; }
function taskRow(x,late){
  return `<div class="task ${x.done?'done':''}">
    <button class="tick" onclick="tog(${x.id})">${ic("check",18,3)}</button>
    <div class="body" onclick="openEdit(${x.id})">
      <div class="t"><span class="pd" style="background:${PRC[x.p||0]}${(x.p||0)===0?';opacity:.35':''}"></span>${esc(x.t)}</div>
      <div class="m">${areaBadge(x.a)}<span class="mins">${ic("clock",16)} ${fmtMin(x.min)}</span>${x.time?`<span class="mins">${x.time}</span>`:""}${late?`<span class="late">${t().late}</span>`:""}</div></div>
    ${x.done?"":`<button class="play" onclick="startFocus(${x.id})">${ic("play",20)}</button>`}
    <button class="del" onclick="delTask(${x.id})">${ic("x",20)}</button></div>`;
}
function buildTimeline(dateISO) {
  const dt = new Date(dateISO);
  const dayWk = (dt.getDay()+6)%7;
  const slots = P().slots.filter(s => s.days.includes(dayWk)).map(s => ({type:'slot', timeStr:s.time, sortTime:s.time.split('–')[0], obj:s}));
  const tasks = P().tasks.filter(x => x.d === dateISO && !x.done).map(t => ({type:'task', timeStr:t.time, sortTime:t.time||"00:00", obj:t}));
  
  const combined = [...slots, ...tasks].sort((a,b) => {
    if(!a.timeStr && b.timeStr) return -1;
    if(a.timeStr && !b.timeStr) return 1;
    return a.sortTime.localeCompare(b.sortTime);
  });
  return combined;
}

  <div class="card">${P().subs.map(x=>{const c=icons[x.cat]||icons.serv;
    return `<div class="sub-row"><div class="sub-ico" style="background:${c[1]};color:${c[2]}">${ic(c[0],28)}</div>
      <div><div class="n">${esc(x.n)}</div><div class="d">${L.renews}: ${x.day} · ${x.cy==="y"?L.yearly:L.monthly}</div></div>
      <div class="amt">€${Number(x.c).toFixed(0)}${x.cy==="y"?`<small>≈ €${monthEq(x).toFixed(0)}/${S.lang==="el"?"μήνα":"mo"}</small>`:""}</div>
      <button class="del" onclick="delSub(${x.id})">${ic("x",22)}</button></div>`;}).join("")||`<div class="empty"><b>${L.noTasks}</b></div>`}
    <div class="total-line"><span>${L.perMonth}<small>€${(totalM*12).toFixed(0)} ${L.perYear}</small></span><span>€${totalM.toFixed(0)}</span></div></div>`;
}
function renderDls(v,L,td){
  const tdd=new Date(td+"T12:00");
  v.innerHTML=`<div class="sec-h"><h2>${ic("flag",22)} ${L.dlTitle}</h2><button class="right" onclick="openDl()">${ic("plus",18)} ${L.addDl}</button></div>
  <div class="card">${P().dls.sort((a,b)=>a.d<b.d?-1:1).map(x=>{
    const dd=Math.round((new Date(x.d+"T12:00")-tdd)/86400000);
    const col=dd<=3?["var(--danger)","var(--danger-soft)"]:dd<=10?["var(--warn)","var(--warn-soft)"]:["var(--good)","var(--good-soft)"];
    const lbl=dd<0?L.late:dd===0?L.todayLit:(dd===1?`1 ${L.daysOne}`:`${dd} ${L.days}`);
    return `<div class="dl"><div class="count" style="color:${col[0]};background:${col[1]}">${dd<=0?"!":dd}<small>${lbl}</small></div>
      <div style="min-width:0"><div style="font-weight:800;font-size:17.5px">${esc(x.t)}</div><div style="font-size:14px;color:var(--ink3);margin-top:6px">${areaBadge(x.a)} · ${x.d}</div></div>
      <button class="plan-btn" onclick="autoplan(${x.id})" ${x.planned?'style="opacity:.5"':''}>${x.planned?L.planned:L.plan}</button>
      <button class="del" onclick="delDl(${x.id})">${ic("x",22)}</button></div>`;}).join("")||`<div class="empty"><b>${L.noTasks}</b></div>`}</div>`;
}

/* ============ Actions ============ */
function qAdd(){
  const inp=$("qa-t"); if(!inp) return;
  const txt = inp.value.trim(); if(!txt)return;
  const a = +$("qa-a").value;
  const min = +$("qa-m").value;
  const time = $("qa-time").value;
  const d = $("qa-d").value || todayISO();
  const p = +$("qa-p").value;
  
  P().tasks.push({id:++uid, t:txt, a, min, d, time, done:false, p});
  save(); boot(); setTimeout(()=>{const i=$("qa-t");if(i){i.value=''; i.focus();}},50);
}
function tog(id){ const x=P().tasks.find(x=>x.id===id); if(!x)return;
  x.done=!x.done;
  if(x.done){ (P().hist=P().hist||[]).push({d:todayISO(),min:x.min,a:x.a}); }
  else{ const h=P().hist||[]; const i=h.findIndex(e=>e.d===todayISO()&&e.min===x.min&&e.a===x.a); if(i>-1)h.splice(i,1); }
  save(); boot(); }
function delTask(id){ P().tasks=P().tasks.filter(x=>x.id!==id); save(); boot(); }
function delSub(id){ P().subs=P().subs.filter(x=>x.id!==id); save(); boot(); }
function delDl(id){ P().dls=P().dls.filter(x=>x.id!==id); save(); boot(); }
function delSlot(id){ P().slots=P().slots.filter(x=>x.id!==id); save(); boot(); }
function addNote(){ const i=$("nT"), v=i.value.trim(); if(!v)return;
  (P().notes=P().notes||[]).unshift({id:++uid,t:v,done:false}); save(); boot();
  setTimeout(()=>{const n=$("nT"); if(n){n.value=''; n.focus();}},50); }
function togNote(id){ const n=(P().notes||[]).find(n=>n.id===id); if(n){n.done=!n.done; save(); boot();} }
function delNote(id){ P().notes=(P().notes||[]).filter(n=>n.id!==id); save(); boot(); }

/* ============ Focus timer ============ */
const fmtClock=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
function startFocus(id){
  const x=P().tasks.find(x=>x.id===id); if(!x)return;
  if(F&&F.int)clearInterval(F.int);
  F={id,total:x.min*60,left:x.min*60,run:true,int:null,title:x.t};
  F.int=setInterval(()=>{ if(!F||!F.run)return; F.left--;
    const txt=(F.left<0?"+":"")+fmtClock(Math.abs(F.left));
    const a=$("fT"); if(a)a.textContent=txt;
    const b=$("mT"); if(b)b.textContent=txt;
  },1000);
  openFocusSheet(); renderMini();
}
function openFocusSheet(){
  if(!F)return; const L=t(); const x=P().tasks.find(x=>x.id===F.id);
  sheet(`<h3>${L.focusT}</h3><p class="sd">${esc(F.title)}</p>
    <div style="font-size:88px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums; margin:32px 0 24px; letter-spacing:-.02em;" id="fT">${(F.left<0?"+":"")+fmtClock(Math.abs(F.left))}</div>
    <div style="display:flex; justify-content:center; margin-bottom:40px;">${x?areaBadge(x.a):""}</div>
    <div style="display:flex; gap:16px;">
      <button style="flex:0 0 auto; width:72px; border-radius:24px; background:var(--card-solid); border:1.5px solid var(--line); transition:.2s; display:flex; align-items:center; justify-content:center; box-shadow:var(--sh-sm);" id="fPause" onclick="pauseFocus()">${ic(F.run?"pause":"play",28)}</button>
      <button class="cta" style="margin-top:0;" onclick="finishFocus()">${ic("check",24)} ${L.focusDone}</button>
    </div>
    <button class="ghost" onclick="minimizeFocus()">${L.focusMin}</button>
    <button class="dangerb" onclick="stopFocus()">${L.focusStop}</button>`);
}
function pauseFocus(){ if(!F)return; F.run=!F.run;
  const p=$("fPause"); if(p)p.innerHTML=ic(F.run?"pause":"play",28);
  const m=$("mPause"); if(m)m.innerHTML=ic(F.run?"pause":"play",20); }
function minimizeFocus(){ $("sheetOvl").classList.add("hide"); renderMini(); }
function reopenFocus(e){ if(F)openFocusSheet(); }
function finishFocus(){ if(!F)return;
  const x=P().tasks.find(x=>x.id===F.id);
  const spent=Math.max(1,Math.round((F.total-Math.min(F.left,F.total))/60));
  if(x&&!x.done){ x.done=true; (P().hist=P().hist||[]).push({d:todayISO(),min:spent,a:x.a}); }
  clearInterval(F.int); F=null; $("sheetOvl").classList.add("hide");
  save(); boot(); }
function stopFocus(){ if(F&&F.int)clearInterval(F.int); F=null; $("sheetOvl").classList.add("hide"); renderMini(); }
function renderMini(){
  const m=$("mini"); if(!m)return;
  if(F){ m.classList.remove("hide");
    $("mTitle").textContent=F.title;
    $("mT").textContent=(F.left<0?"+":"")+fmtClock(Math.abs(F.left));
    $("mPause").innerHTML=ic(F.run?"pause":"play",20);
    $("mDone").innerHTML=ic("check",20);
  } else m.classList.add("hide");
}

/* ============ Edit / add-on-day ============ */
function openEdit(id){
  const x=P().tasks.find(x=>x.id===id); if(!x)return; const L=t();
  sheet(`<h3>${L.edit}</h3>
  <div class="f-row"><label>${L.name}</label><input id="eT" type="text" value="${esc(x.t)}"></div>
  <div class="f-grid">
    <div class="f-row"><label>${L.area}</label><select id="eA">${P().areas.map((a,i)=>`<option value="${i}" ${i===x.a?"selected":""}>${esc(a)}</option>`).join("")}</select></div>
    <div class="f-row"><label>${L.minutes}</label><input id="eM" type="number" min="1" max="1439" value="${x.min}"></div>
    <div class="f-row"><label>${L.time}</label><input id="eTi" type="time" value="${x.time||''}"></div>
    <div class="f-row"><label>${L.date}</label><input id="eD" type="date" value="${x.d}"></div>
    <div class="f-row"><label>${L.prio}</label><select id="eP">${L.prios.map((p,i)=>`<option value="${i}" ${i===(x.p||0)?"selected":""}>${p}</option>`).join("")}</select></div>
  </div>
  <button class="cta" onclick="saveEdit(${id})">${L.saveB}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`);
}
function saveEdit(id){ const x=P().tasks.find(x=>x.id===id); if(x){
  x.t=$("eT").value.trim()||x.t; x.a=+$("eA").value; x.min=Math.max(1,+$("eM").value||x.min);
  x.time=$("eTi").value; x.d=$("eD").value||x.d; x.p=+$("eP").value; }
  closeSheet(); save(); boot(); }
function openAddOn(iso){ const L=t();
  sheet(`<h3>${L.addOn}</h3><p class="sd">${iso}</p>
  <div class="f-row"><label>${L.name}</label><input id="aT" type="text" placeholder="${L.qPh}"></div>
  <div class="f-grid">
    <div class="f-row"><label>${L.area}</label><select id="aA">${P().areas.map((a,i)=>`<option value="${i}">${esc(a)}</option>`).join("")}</select></div>
    <div class="f-row"><label>${L.minutes}</label><input id="aM" type="number" min="1" value="30"></div>
    <div class="f-row"><label>${L.time}</label><input id="aTi" type="time"></div>
    <div class="f-row"><label>${L.prio}</label><select id="aP"><option value="0">${L.prios[0]}</option><option value="1" selected>${L.prios[1]}</option><option value="2">${L.prios[2]}</option></select></div>
  </div>
  <button class="cta" onclick="createOn('${iso}')">${L.create}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function createOn(iso){ const txt=$("aT").value.trim(); if(!txt){closeSheet();return;}
  P().tasks.push({id:++uid,t:txt,a:+$("aA").value,min:Math.max(1,+$("aM").value||30),d:iso,time:$("aTi").value,done:false,p:+$("aP").value});
  closeSheet(); save(); boot(); }

/* ============ Auto-plan & flows ============ */
function runFlow(fn){
  const L=t();
  const areaSel=id=>`<select id="${id}">${P().areas.map((a,i)=>`<option value="${i}">${esc(a)}</option>`).join("")}</select>`;
  const fData = L[fn];
  
  sheet(`<h3>${fData[1]}</h3><p class="sd">${fData[2]}</p>
    <div class="f-row"><label>${L.pickArea}</label>${areaSel("fA")}</div>
    <button class="cta" onclick="applyFlow('${fn}')">${L.apply}</button>
    <button class="ghost" onclick="closeSheet()">${L.cancel}</button>`);
}

function applyFlow(fn) {
  const L = t();
  const a = +$("fA").value;
  const iso = todayISO();
  
  const rules = {
    fDeep: [[L.el?'90m Deep Work (Εκτέλεση)':'90m Deep Work (Focus)', 90, 2], [L.el?'15m Διάλειμμα':'15m Break', 15, 0], [L.el?'90m Deep Work (Ολοκλήρωση)':'90m Deep Work (Execution)', 90, 2]],
    fDev: [['Git Pull & Dependencies', 15, 1], ['Feature Implementation', 60, 2], ['Build & Test', 20, 1], ['Deployment', 10, 2]],
    fLead: [[L.el?'Directory Scraping (20 Leads)':'Directory Scraping (20 Leads)', 30, 1], [L.el?'Personalize Copy':'Personalize Copy', 45, 2], [L.el?'Αποστολή B2B Emails':'Send B2B Cold Outreach', 20, 2]],
    fGym: [[L.el?'Ζέσταμα (10m)':'Dynamic Warmup', 10, 0], [L.el?'Βασικές Ασκήσεις / Lifts':'Compound Heavy Lifts', 40, 2], [L.el?'Συμπληρωματικές / Accessories':'Hypertrophy Accessories', 30, 1], [L.el?'Διατάσεις (10m)':'Stretch', 10, 0]],
    fAudit: [[L.el?'Audit Υποδομών & Subs':'Audit Subscriptions & Servers', 30, 1], [L.el?'Έλεγχος Τιμολογίων':'Invoice Check', 20, 1], [L.el?'Αποστολή Reports':'Send Reports', 15, 2]]
  };
  
  const steps = rules[fn];
  if(steps) {
    steps.forEach(([title, min, prio]) => {
      P().tasks.push({id:++uid, t: title, a, min, d: iso, time:"", done: false, p: prio});
    });
  }
  
  closeSheet(); save(); curTab="today"; boot();
}

function autoplan(id){
  const x=P().dls.find(d=>d.id===id); if(!x||x.planned)return;
  const L=t();
  const today=new Date(todayISO()+"T12:00"), exam=new Date(x.d+"T12:00");
  const span=Math.max(1,Math.round((exam-today)/86400000)-1);
  const steps = L.el ? ["Έρευνα & Σημειώσεις", "Προσχέδιο / Ασκήσεις", "Αναθεώρηση & Μορφοποίηση", "Τελική Υποβολή"] : ["Research & Notes", "First Draft / Exercises", "Review & Formatting", "Final Submit"];
  steps.forEach((s,i)=>{
    const off=Math.min(span,Math.max(0,Math.round(span*(i/(steps.length-1||1)))));
    P().tasks.push({id:++uid,t:`${s} — ${x.t}`,a:x.a,min:60,d:isoPlus(off),time:"",done:false,p:2});
  });
  x.planned=true; save(); curTab="week"; weekOff=0; boot();
}

/* ============ Sheets Modals ============ */
function sheet(html){ $("sheetBody").innerHTML=`<div class="grab"></div>`+html; $("sheetOvl").classList.remove("hide"); }
function closeSheet(){ $("sheetOvl").classList.add("hide"); renderMini(); }
$("sheetOvl").addEventListener("click",e=>{ if(e.target.id==="sheetOvl"){ if(F){minimizeFocus();} else closeSheet(); } });

  sheet(`<h3>${L.newProfile}</h3>

function createProfile(){ const n=$("npN").value.trim()||"—";

function openDl(){ const L=t();

  <div class="f-grid">
    <div class="f-row"><label>${L.dlArea}</label><select id="dA">${P().areas.map((a,i)=>`<option value="${i}">${esc(a)}</option>`).join("")}</select></div>

function createDl(){ const n=$("dN").value.trim(); if(!n){closeSheet();return;}

function openSlot(){ const L=t();
  sheet(`<h3>${L.addSlot}</h3>
  <div class="f-row"><label>${L.name}</label><input id="slN" type="text" placeholder="${L.slotName}"></div>
  <div class="f-row"><label>${L.slotDays}</label><div class="chipset" id="slDays">${t().wk.map((w,i)=>`<button class="pchip" data-i="${i}" onclick="this.classList.toggle('on')">${w}</button>`).join("")}</div></div>
  <div class="f-row"><label>${L.slotTime}</label><input id="slT" type="text" placeholder="10:00–12:00"></div>
  <button class="cta" onclick="createSlot()">${L.create}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function createSlot(){ const n=$("slN").value.trim(); if(!n){closeSheet();return;}
  const days=[...document.querySelectorAll("#slDays .pchip.on")].map(b=>+b.dataset.i);
  P().slots.push({id:++uid,n,days:days.length?days:[0],time:$("slT").value.trim()||"—"});
  closeSheet(); save(); boot(); }

/* ============ Settings ============ */
function openSettings(){ const L=t();
  sheet(`<h3>${L.settings}</h3>
  <div class="f-row"><label>${L.areasH}</label>
    <div class="chipset" style="margin-bottom:14px">${P().areas.map(a=>`<span class="pchip on">${esc(a)}</span>`).join("")}</div>
    <div style="display:flex;gap:14px"><input id="stArea" type="text" placeholder="${L.areaPh}">
    <button class="btn-p" style="margin-top:0;" onclick="addArea()">${ic("plus",20)}</button></div></div>
  <button class="ghost" onclick="backup()" style="border:1px solid var(--line2); display:flex; align-items:center; justify-content:center; gap:12px">${ic("code",22)} ${L.backup}</button>
  <button class="dangerb" onclick="resetAll()">${L.resetB}</button>
  <button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function addArea(){ const v=$("stArea").value.trim(); if(v){P().areas.push(v); save();} openSettings(); }
function backup(){ try{
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="panta-backup.json"; a.click();
  }catch(e){} }
function resetAll(){ if(confirm(t().resetQ)){ store.del("panta_v2"); store.del("panta_v1"); location.reload(); } }

/* ============ Start ============ */
if(S){ $("onb").classList.add("hide"); boot(); } else { renderOnb(); }
</script>
