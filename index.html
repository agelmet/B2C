<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5F5F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Πάντα">
<meta name="mobile-web-app-capable" content="yes">
<title>Πάντα — Τα πάντα σου. Πάντα.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Literata:ital,opsz,wght@1,7..72,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5F7; --card:#FFFFFF; --card2:#FBFBFC;
  --ink:#18181B; --ink2:#55555E; --ink3:#9B9BA6;
  --line:rgba(24,24,27,.07); --line2:rgba(24,24,27,.12);
  --a1:#6366F1; --a2:#8B5CF6;
  --grad:linear-gradient(135deg,#6366F1 0%,#8B5CF6 100%);
  --accent:#5B5CE2; --accent-soft:#EEEEFE; --accent-text:#4F46E5;
  --good:#16A34A; --good-soft:#EAF7EF; --warn:#D97706; --warn-soft:#FCF3E6;
  --danger:#E11D48; --danger-soft:#FDECF0; --track:#EBEBEF;
  --r:20px; --ri:14px;
  --sh:0 1px 2px rgba(24,24,27,.04),0 8px 24px rgba(24,24,27,.05);
  --sh-lg:0 8px 24px rgba(24,24,27,.10),0 24px 64px rgba(24,24,27,.14);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;padding-bottom:calc(110px + env(safe-area-inset-bottom));font-feature-settings:"cv02","cv03","cv11";}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}
input,select{font-family:inherit;font-size:15px;color:var(--ink);}
svg{display:block;flex:0 0 auto;}
.app{max-width:1020px;margin:0 auto;padding:0 18px;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

/* ===== Top bar ===== */
.top{display:flex;align-items:center;gap:10px;padding:20px 0 8px;}
.brand{font-weight:800;font-size:21px;letter-spacing:-.035em;}
.brand .dot{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand-tag{font-family:'Literata',serif;font-style:italic;font-size:12.5px;color:var(--ink3);display:none;font-weight:500;}
@media(min-width:700px){.brand-tag{display:inline;margin-left:10px;}}
.top .spacer{flex:1;}
.profiles{display:flex;gap:6px;align-items:center;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-text);font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;border:2px solid transparent;transition:.18s;}
.avatar.active{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35);}
.avatar.add{background:transparent;border:1.5px dashed var(--line2);color:var(--ink3);}
.iconbtn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:.18s;box-shadow:0 1px 2px rgba(24,24,27,.03);}
.iconbtn:hover{border-color:var(--line2);color:var(--ink);}
.lang{font-size:11.5px;font-weight:700;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 13px;letter-spacing:.02em;box-shadow:0 1px 2px rgba(24,24,27,.03);}

/* ===== Hero ===== */
.hero{display:flex;align-items:center;gap:20px;padding:14px 0 6px;}
.hero h1{font-size:clamp(23px,5vw,31px);font-weight:800;letter-spacing:-.03em;line-height:1.12;}
.hero .sub{color:var(--ink2);font-size:14px;margin-top:3px;font-weight:500;}
.ringwrap{position:relative;width:84px;height:84px;flex:0 0 auto;}
.ringwrap .txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ringwrap b{font-size:16px;font-weight:800;letter-spacing:-.02em;}
.ringwrap span{font-size:8.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-top:1px;}

/* ===== Tabs ===== */
.tabs{display:flex;gap:2px;background:#ECECEF;border-radius:16px;padding:4px;margin:16px 0 20px;}
.tabs button{flex:1;padding:10px 4px;border-radius:12px;font-weight:600;font-size:13px;color:var(--ink2);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .22s cubic-bezier(.3,.9,.4,1);}
.tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(24,24,27,.08),0 4px 12px rgba(24,24,27,.06);}
.tabs button .lbl{white-space:nowrap;}
@media(max-width:699px){
  .tabs{position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));margin:0;z-index:60;
    background:rgba(255,255,255,.78);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
    border:1px solid rgba(24,24,27,.06);border-radius:24px;box-shadow:var(--sh-lg);padding:8px 6px;}
  .tabs button{flex-direction:column;gap:4px;padding:6px 1px;border-radius:14px;color:var(--ink3);}
  .tabs button .lbl{font-size:9.6px;font-weight:600;}
  .tabs button.on{background:transparent;box-shadow:none;color:var(--accent-text);}
}

/* ===== Layout & cards ===== */
#view{animation:vin .28s ease;}
@keyframes vin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:20px;margin-bottom:14px;}
.sec-h{display:flex;align-items:center;gap:10px;margin:22px 0 12px;flex-wrap:wrap;}
.sec-h h2{font-size:15.5px;font-weight:700;letter-spacing:-.015em;display:flex;align-items:center;gap:8px;}
.sec-h h2 svg{color:var(--ink3);}
.sec-h .hint{font-size:12.5px;color:var(--ink3);font-weight:500;}
.sec-h .right{margin-left:auto;font-size:13px;font-weight:600;color:var(--accent-text);display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;background:var(--accent-soft);transition:.15s;}
.sec-h .right:hover{filter:brightness(.97);}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
.stat-grid.four{grid-template-columns:repeat(4,1fr);}
@media(max-width:520px){.stat-grid.four{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 16px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.stat b{font-size:21px;font-weight:800;letter-spacing:-.03em;display:block;font-variant-numeric:tabular-nums;}
.stat span{font-size:10.5px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.stat .si{position:absolute;top:13px;right:13px;color:var(--ink3);opacity:.55;}

/* ===== Quick add ===== */
.qadd{display:flex;flex-direction:column;gap:12px;}
.qadd .row1{display:flex;gap:8px;}
.qadd input[type=text]{flex:1;border:1.5px solid var(--line2);border-radius:var(--ri);padding:13px 15px;background:var(--card2);outline:none;transition:.18s;min-width:0;font-weight:500;}
.qadd input[type=text]::placeholder{color:var(--ink3);font-weight:400;}
.qadd input[type=text]:focus{border-color:var(--a1);background:var(--card);box-shadow:0 0 0 4px rgba(99,102,241,.10);}
.btn-p{background:var(--grad);color:#fff;font-weight:700;border-radius:var(--ri);padding:0 20px;font-size:14.5px;transition:.18s;box-shadow:0 4px 14px rgba(99,102,241,.30);display:flex;align-items:center;gap:7px;}
.btn-p:hover{filter:brightness(1.06);}
.btn-p:active{transform:scale(.98);}
.chipset{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.chipset .lb{font-size:10px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-right:3px;}
.pchip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;background:transparent;border:1.5px solid var(--line2);color:var(--ink2);transition:.14s;}
.pchip:hover{border-color:var(--ink3);}
.pchip.on{border-color:var(--ink);background:var(--ink);color:#fff;}
.pchip.p0.on{border-color:var(--ink3);background:var(--ink2);}
.pchip.p1.on{border-color:var(--warn);background:var(--warn);}
.pchip.p2.on{border-color:var(--danger);background:var(--danger);}
.pchip .pd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px;}
.mini-in{width:88px;border:1.5px solid var(--line2);border-radius:999px;padding:7px 13px;background:var(--card2);outline:none;font-size:12.5px;font-weight:600;transition:.15s;}
.mini-in:focus{border-color:var(--a1);background:var(--card);}

/* ===== Tasks ===== */
.tlist .task:last-child{border-bottom:none;}
.task{display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);transition:background .12s;border-radius:10px;}
.task:hover{background:var(--card2);}
.tick{width:23px;height:23px;border-radius:50%;border:1.7px solid var(--line2);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:transparent;transition:.16s;}
.tick:hover{border-color:var(--a1);}
@keyframes pop{0%{transform:scale(.5);}60%{transform:scale(1.14);}100%{transform:scale(1);}}
.task.done .tick{background:var(--grad);border-color:transparent;color:#fff;animation:pop .28s ease;}
.task .body{flex:1;min-width:0;cursor:pointer;}
.task .t{font-weight:600;font-size:14.5px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;}
.task .t .pd{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
.task.done .t{text-decoration:line-through;color:var(--ink3);}
.task .m{display:flex;gap:9px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.badge{font-size:10.5px;font-weight:700;padding:3.5px 9px;border-radius:999px;letter-spacing:.01em;}
.mins{font-size:11.5px;color:var(--ink3);font-weight:600;display:flex;align-items:center;gap:4px;}
.late{font-size:10.5px;font-weight:700;color:var(--danger);background:var(--danger-soft);padding:3.5px 8px;border-radius:999px;}
.play{width:32px;height:32px;border-radius:50%;background:var(--accent-soft);color:var(--accent-text);flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.16s;}
.play:hover{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35);}
.del{color:var(--ink3);padding:7px;opacity:.5;transition:.14s;border-radius:8px;}
.del:hover{opacity:1;color:var(--danger);background:var(--danger-soft);}
.empty{color:var(--ink3);font-size:13.5px;text-align:center;padding:28px 10px;}
.empty b{display:block;font-size:14.5px;color:var(--ink2);margin-bottom:3px;font-weight:600;}
.alldone{text-align:center;padding:30px 10px;}
.alldone .aic{width:52px;height:52px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 8px 24px rgba(99,102,241,.35);}
.alldone b{display:block;font-size:16px;letter-spacing:-.01em;}
.alldone span{font-size:13px;color:var(--ink2);}

/* ===== Week ===== */
.wk-nav{display:flex;align-items:center;gap:8px;margin-left:auto;}
.wk-nav .arr{width:32px;height:32px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--ink2);display:flex;align-items:center;justify-content:center;transition:.15s;}
.wk-nav .arr:hover{border-color:var(--line2);color:var(--ink);}
.wk-nav .cur{font-weight:600;font-size:12.5px;color:var(--ink2);min-width:104px;text-align:center;}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;}
@media(max-width:780px){.week{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:8px;margin:0 -18px;padding-left:18px;padding-right:18px;scrollbar-width:none;}
.week::-webkit-scrollbar{display:none;}
.day{min-width:66vw;scroll-snap-align:start;}}
.day{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:var(--sh);}
.day.today{border-color:transparent;box-shadow:0 0 0 2px var(--a1),var(--sh);}
.day-h{display:flex;align-items:center;gap:8px;}
.day-h .dn{font-size:20px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.day.today .dn{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.day-h .dw{font-size:9.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink3);font-weight:700;line-height:1.3;}
.day-h .dadd{margin-left:auto;width:26px;height:26px;border-radius:9px;background:var(--card2);border:1px solid var(--line2);color:var(--ink3);display:flex;align-items:center;justify-content:center;transition:.15s;}
.day-h .dadd:hover{border-color:var(--a1);color:var(--accent-text);background:var(--accent-soft);}
.day-load{font-size:10px;color:var(--ink3);font-weight:600;margin:2px 0 6px;min-height:14px;display:flex;align-items:center;gap:4px;}
.slot{font-size:10.5px;font-weight:600;background:var(--card2);border:1px solid var(--line);padding:6px 9px;border-radius:10px;margin-top:6px;color:var(--ink2);display:flex;justify-content:space-between;gap:6px;align-items:center;}
.slot .x{opacity:0;color:var(--ink3);transition:.12s;display:flex;}
.slot:hover .x{opacity:.8;}
.dtask{font-size:12px;font-weight:600;padding:7px 9px;border-radius:11px;margin-top:6px;display:flex;gap:6px;align-items:center;cursor:pointer;transition:.12s;}
.dtask:hover{filter:brightness(.97);}
.dtask.done{opacity:.38;text-decoration:line-through;}
.dtask .dm{margin-left:auto;font-size:10px;font-weight:700;opacity:.7;flex:0 0 auto;font-variant-numeric:tabular-nums;}

/* ===== Stats ===== */
.chart{display:flex;gap:9px;align-items:flex-end;height:158px;padding:8px 2px 0;}
.chart .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;}
.chart .bar{width:100%;max-width:42px;border-radius:10px;background:var(--track);transition:height .55s cubic-bezier(.3,.9,.4,1);min-height:5px;}
.chart .bar.hot{background:var(--grad);box-shadow:0 6px 16px rgba(99,102,241,.30);}
.chart .val{font-size:9.5px;font-weight:700;color:var(--ink2);font-variant-numeric:tabular-nums;min-height:13px;}
.chart .dlb{font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}
.chart .col.today .dlb{color:var(--accent-text);}
.abar{display:flex;align-items:center;gap:11px;margin:11px 0;}
.abar .an{width:100px;font-size:12.5px;font-weight:600;flex:0 0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.abar .atr{flex:1;height:9px;background:var(--track);border-radius:999px;overflow:hidden;}
.abar .af{height:100%;border-radius:999px;transition:width .55s cubic-bezier(.3,.9,.4,1);}
.abar .av{font-size:11px;font-weight:700;color:var(--ink2);width:52px;text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums;}

/* ===== Subs / deadlines ===== */
.sub-row{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--line);}
.sub-row:last-child{border:none;}
.sub-ico{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.sub-row .n{font-weight:600;font-size:14px;letter-spacing:-.01em;}
.sub-row .d{font-size:11.5px;color:var(--ink3);font-weight:500;}
.sub-row .amt{margin-left:auto;font-weight:800;font-size:15px;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.sub-row .amt small{display:block;font-size:10px;font-weight:600;color:var(--ink3);}
.total-line{display:flex;justify-content:space-between;align-items:center;padding-top:15px;margin-top:5px;border-top:1.5px solid var(--ink);font-weight:800;letter-spacing:-.01em;}
.total-line small{display:block;font-size:11px;color:var(--ink3);font-weight:600;}
.dl{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--line);}
.dl:last-child{border:none;}
.count{min-width:56px;text-align:center;border-radius:14px;padding:8px 4px;font-weight:800;font-size:16px;line-height:1;flex:0 0 auto;font-variant-numeric:tabular-nums;}
.count small{display:block;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;opacity:.8;}
.plan-btn{margin-left:auto;font-size:12px;font-weight:600;color:var(--accent-text);background:var(--accent-soft);padding:8px 13px;border-radius:999px;white-space:nowrap;flex:0 0 auto;transition:.15s;}
.plan-btn:hover{filter:brightness(.97);}

/* ===== Flows ===== */
.flows{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:11px;}
.flow{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:17px;text-align:left;transition:.18s;box-shadow:var(--sh);}
.flow:hover{border-color:rgba(99,102,241,.4);transform:translateY(-2px);box-shadow:0 8px 24px rgba(24,24,27,.09);}
.flow .fi{width:38px;height:38px;border-radius:12px;background:var(--accent-soft);color:var(--accent-text);display:flex;align-items:center;justify-content:center;}
.flow b{display:block;font-size:13.5px;margin-top:11px;letter-spacing:-.01em;}
.flow span{font-size:11.5px;color:var(--ink2);display:block;margin-top:3px;line-height:1.5;font-weight:500;}

/* ===== Notes ===== */
.nrow{display:flex;gap:8px;margin-bottom:8px;}
.nrow input{flex:1;min-width:0;border:1.5px solid var(--line2);border-radius:var(--ri);padding:12px 14px;background:var(--card2);outline:none;transition:.18s;font-weight:500;}
.nrow input:focus{border-color:var(--a1);background:var(--card);box-shadow:0 0 0 4px rgba(99,102,241,.10);}
.nrow .btn-p{padding:0 16px;}

/* ===== Mini focus bar ===== */
.mini{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(84px + env(safe-area-inset-bottom));z-index:70;
  display:flex;align-items:center;gap:11px;background:rgba(24,24,27,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  color:#fff;border-radius:999px;padding:9px 11px 9px 17px;box-shadow:var(--sh-lg);max-width:min(92vw,430px);cursor:pointer;animation:vin .25s ease;}
@media(min-width:700px){.mini{bottom:26px;}}
.mini .mt{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;opacity:.85;}
.mini .mc{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.01em;}
.mini .mb{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;display:flex;align-items:center;justify-content:center;transition:.15s;}
.mini .mb:hover{background:rgba(255,255,255,.26);}
.mini .mb.ok{background:var(--grad);}

/* ===== Sheets ===== */
.ovl{position:fixed;inset:0;background:rgba(24,24,27,.40);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.ovl{align-items:center;}}
@keyframes rise{from{transform:translateY(28px);opacity:.5;}to{transform:none;opacity:1;}}
.sheet{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-width:470px;padding:12px 22px calc(26px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:rise .26s cubic-bezier(.3,.9,.4,1);}
@media(min-width:640px){.sheet{border-radius:26px;padding-top:24px;}}
.grab{width:38px;height:4.5px;border-radius:99px;background:var(--track);margin:0 auto 18px;}
@media(min-width:640px){.grab{display:none;}}
.sheet h3{font-size:18.5px;font-weight:800;margin-bottom:4px;letter-spacing:-.025em;}
.sheet .sd{font-size:13px;color:var(--ink2);margin-bottom:17px;font-weight:500;}
.f-row{margin-bottom:13px;}
.f-row label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:7px;}
.f-row input,.f-row select{width:100%;border:1.5px solid var(--line2);border-radius:var(--ri);padding:12px 14px;background:var(--card2);outline:none;transition:.15s;font-weight:500;appearance:none;}
.f-row select{background-image:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%239b9ba6' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 13px center;}
.f-row input:focus,.f-row select:focus{border-color:var(--a1);background:var(--card);box-shadow:0 0 0 4px rgba(99,102,241,.10);}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.cta{width:100%;background:var(--grad);color:#fff;font-weight:700;font-size:15px;border-radius:15px;padding:15px;margin-top:7px;transition:.18s;box-shadow:0 6px 18px rgba(99,102,241,.30);}
.cta:hover{filter:brightness(1.06);}
.cta:active{transform:scale(.99);}
.ghost{width:100%;color:var(--ink2);font-weight:600;padding:13px;font-size:13.5px;}
.dangerb{width:100%;color:var(--danger);font-weight:600;padding:13px;font-size:13.5px;}
.persona-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0 8px;}
.persona{border:1.5px solid var(--line2);border-radius:18px;padding:17px 13px;text-align:center;transition:.16s;}
.persona .pi{width:42px;height:42px;border-radius:14px;background:var(--card2);border:1px solid var(--line);color:var(--ink2);display:flex;align-items:center;justify-content:center;margin:0 auto;transition:.16s;}
.persona.on{border-color:var(--a1);background:var(--accent-soft);}
.persona.on .pi{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(99,102,241,.3);}
.persona b{display:block;font-size:13.5px;margin-top:9px;letter-spacing:-.01em;}
.persona span{font-size:11px;color:var(--ink2);font-weight:500;}
.wordmark{font-size:36px;font-weight:800;letter-spacing:-.045em;text-align:center;}
.wordmark .dot{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.tagline{font-family:'Literata',serif;font-style:italic;text-align:center;color:var(--ink2);font-size:14px;margin:4px 0 20px;}
.hide{display:none!important;}
.prem{font-size:12px;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-top:12px;line-height:1.6;font-weight:500;box-shadow:var(--sh);}
.prem b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.focus-time{font-size:64px;font-weight:800;letter-spacing:-.04em;text-align:center;font-variant-numeric:tabular-nums;margin:14px 0 4px;}
.focus-sub{display:flex;justify-content:center;margin-bottom:20px;}
.frow{display:flex;gap:10px;}
.frow .cta{margin-top:0;}
.fbtn{flex:0 0 auto;width:54px;border-radius:15px;background:var(--card2);border:1.5px solid var(--line2);color:var(--ink);display:flex;align-items:center;justify-content:center;transition:.15s;}
.fbtn:hover{border-color:var(--ink3);}

let S=null, curTab="today", weekOff=0, uid=Date.now();

function load(){
  let raw=store.get("panta_v2");

  raw=store.get("panta_v1");
  if(raw){ try{ S=JSON.parse(raw);
    S.profiles.forEach(pr=>{ pr.hist=pr.hist||[]; pr.notes=pr.notes||[]; pr.tasks.forEach(t=>t.p=t.p??0); pr.subs.forEach(s=>s.cy=s.cy||"m"); });
    save(); }catch(e){S=null;} }
}
function save(){ store.set("panta_v2",JSON.stringify(S)); }
function P(){ return S.profiles[S.active]; }
function t(){ return T[S?S.lang:"el"]; }

const isoPlus=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
function nextWeekdayISO(w){ const now=new Date(); const cur=(now.getDay()+6)%7; return isoPlus((w-cur+7)%7); }

/* ============ Boot ============ */
function boot(){
  const L=t();
  document.documentElement.lang=S.lang;
  $("brandTag").textContent=L.tag;
  $("langBtn").textContent=S.lang==="el"?"EN":"ΕΛ";
  $("ringLbl").textContent=L.ringLbl;
  $("gearBtn").innerHTML=ic("gear",16);
  $("mPause").innerHTML=ic(F&&F.run?"pause":"play",14);
  $("mDone").innerHTML=ic("check",15);
  const td=todayISO();
  if(S.lastDay!==td){ const y=new Date();y.setDate(y.getDate()-1);
    S.streak=(S.lastDay===y.toISOString().slice(0,10))?S.streak+1:1; S.lastDay=td; save(); }
  $("profileBar").innerHTML=S.profiles.map((p,i)=>
    `<button class="avatar ${i===S.active?'active':''}" title="${esc(p.name)}" onclick="S.active=${i};save();boot()">${esc(p.name.slice(0,2).toUpperCase())}</button>`).join("")+
    `<button class="avatar add" onclick="openNewProfile()">${ic("plus",15)}</button>`;
  const h=new Date().getHours(), hi=L.hi[h<12?0:h<19?1:2];
  $("greet").textContent=`${hi}, ${P().name}`;
  const open=P().tasks.filter(x=>!x.done&&x.d<=td);
  const mins=open.reduce((s,x)=>s+x.min,0);
  $("greetSub").textContent=open.length?L.greetSub({left:open.length,time:fmtMin(mins)}):L.allDone;
  const dueToday=P().tasks.filter(x=>x.d===td);
  const pct=dueToday.length?Math.round(dueToday.filter(x=>x.done).length/dueToday.length*100):0;
  $("ringFg").style.strokeDashoffset=(226.2*(1-pct/100)).toFixed(1);
  $("ringPct").textContent=pct+"%";
  const tabs=[["today","sun",L.today],["week","cal",L.week],["stats","chart",L.stats],["subs","card",L.subs],["dls","flag",L.dls],["flows","spark",L.flows]];
  $("tabs").innerHTML=tabs.map(([k,i,l])=>
    `<button class="${curTab===k?'on':''}" onclick="curTab='${k}';boot()">${ic(i,17)}<span class="lbl">${l}</span></button>`).join("");
  render(); renderMini();
}

function renderStats(v,L){

function targetDate(){ if(qD===0)return todayISO(); if(qD===1)return isoPlus(1); return nextWeekdayISO(qD-10); }
function qAdd(){
  const inp=$("qT"), txt=inp.value.trim(); if(!txt)return;
  const cm=parseInt(($("qCust")||{}).value); const min=(cm>0&&cm<1440)?cm:qM;
  P().tasks.push({id:++uid,t:txt,a:qA,min,d:targetDate(),done:false,p:qP});
  save(); boot(); setTimeout(()=>{const i=$("qT");if(i)i.focus();},50);
}
function tog(id){ const x=P().tasks.find(x=>x.id===id); if(!x)return;
  x.done=!x.done;
  if(x.done){ (P().hist=P().hist||[]).push({d:todayISO(),min:x.min,a:x.a}); }
  else{ const h=P().hist||[]; const i=h.findIndex(e=>e.d===todayISO()&&e.min===x.min&&e.a===x.a); if(i>-1)h.splice(i,1); }
  save(); boot(); }
function delTask(id){ P().tasks=P().tasks.filter(x=>x.id!==id); save(); boot(); }
function delSub(id){ P().subs=P().subs.filter(x=>x.id!==id); save(); boot(); }
function delDl(id){ P().dls=P().dls.filter(x=>x.id!==id); save(); boot(); }
function delSlot(id){ P().slots=P().slots.filter(x=>x.id!==id); save(); boot(); }
function addNote(){ const i=$("nT"), v=i.value.trim(); if(!v)return;
  (P().notes=P().notes||[]).push({id:++uid,t:v,done:false}); save(); boot();
  setTimeout(()=>{const n=$("nT"); if(n){n.focus(); n.scrollIntoView({block:"center"});}},50); }
function togNote(id){ const n=(P().notes||[]).find(n=>n.id===id); if(n){n.done=!n.done; save(); boot();} }
function delNote(id){ P().notes=(P().notes||[]).filter(n=>n.id!==id); save(); boot(); }

/* ============ Focus timer (sheet + persistent mini bar) ============ */
const fmtClock=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
function startFocus(id){
  const x=P().tasks.find(x=>x.id===id); if(!x)return;
  if(F&&F.int)clearInterval(F.int);
  F={id,total:x.min*60,left:x.min*60,run:true,int:null,title:x.t};
  F.int=setInterval(()=>{ if(!F||!F.run)return; F.left--;
    const txt=(F.left<0?"+":"")+fmtClock(Math.abs(F.left));
    const a=$("fT"); if(a)a.textContent=txt;
    const b=$("mT"); if(b)b.textContent=txt;
  },1000);
  openFocusSheet(); renderMini();
}
function openFocusSheet(){
  if(!F)return; const L=t(); const x=P().tasks.find(x=>x.id===F.id);
  sheet(`<h3>${L.focusT}</h3><p class="sd">${esc(F.title)}</p>
    <div class="focus-time" id="fT">${(F.left<0?"+":"")+fmtClock(Math.abs(F.left))}</div>
    <div class="focus-sub">${x?areaBadge(x.a):""}</div>
    <div class="frow">
      <button class="fbtn" id="fPause" onclick="pauseFocus()">${ic(F.run?"pause":"play",17)}</button>
      <button class="cta" onclick="finishFocus()">${ic("check",15)} ${L.focusDone}</button>
    </div>
    <button class="ghost" onclick="minimizeFocus()">${L.focusMin}</button>
    <button class="dangerb" onclick="stopFocus()">${L.focusStop}</button>`,true);
}
function pauseFocus(){ if(!F)return; F.run=!F.run;
  const p=$("fPause"); if(p)p.innerHTML=ic(F.run?"pause":"play",17);
  const m=$("mPause"); if(m)m.innerHTML=ic(F.run?"pause":"play",14); }
function minimizeFocus(){ $("sheetOvl").classList.add("hide"); renderMini(); }
function reopenFocus(e){ if(F)openFocusSheet(); }
function finishFocus(){ if(!F)return;
  const x=P().tasks.find(x=>x.id===F.id);
  const spent=Math.max(1,Math.round((F.total-Math.min(F.left,F.total))/60));
  if(x&&!x.done){ x.done=true; (P().hist=P().hist||[]).push({d:todayISO(),min:spent,a:x.a}); }
  clearInterval(F.int); F=null; $("sheetOvl").classList.add("hide");
  save(); boot(); }
function stopFocus(){ if(F&&F.int)clearInterval(F.int); F=null; $("sheetOvl").classList.add("hide"); renderMini(); }
function renderMini(){
  const m=$("mini"); if(!m)return;
  if(F){ m.classList.remove("hide");
    $("mTitle").textContent=F.title;
    $("mT").textContent=(F.left<0?"+":"")+fmtClock(Math.abs(F.left));
    $("mPause").innerHTML=ic(F.run?"pause":"play",14);
    $("mDone").innerHTML=ic("check",15);
  } else m.classList.add("hide");
}

/* ============ Edit / add-on-day ============ */
function openEdit(id){
  const x=P().tasks.find(x=>x.id===id); if(!x)return; const L=t();
  sheet(`<h3>${L.edit}</h3>
  <div class="f-row"><label>${L.name}</label><input id="eT" type="text" value="${esc(x.t)}"></div>
  <div class="f-grid">
    <div class="f-row"><label>${L.area}</label><select id="eA">${P().areas.map((a,i)=>`<option value="${i}" ${i===x.a?"selected":""}>${esc(a)}</option>`).join("")}</select></div>
    <div class="f-row"><label>${L.minutes}</label><input id="eM" type="number" min="1" max="1439" value="${x.min}"></div>
    <div class="f-row"><label>${L.date}</label><input id="eD" type="date" value="${x.d}"></div>
    <div class="f-row"><label>${L.prio}</label><select id="eP">${L.prios.map((p,i)=>`<option value="${i}" ${i===(x.p||0)?"selected":""}>${p}</option>`).join("")}</select></div>
  </div>
  <button class="cta" onclick="saveEdit(${id})">${L.saveB}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`);
}
function saveEdit(id){ const x=P().tasks.find(x=>x.id===id); if(x){
  x.t=$("eT").value.trim()||x.t; x.a=+$("eA").value; x.min=Math.max(1,+$("eM").value||x.min);
  x.d=$("eD").value||x.d; x.p=+$("eP").value; }
  closeSheet(); save(); boot(); }
function openAddOn(iso){ const L=t();
  sheet(`<h3>${L.addOn}</h3><p class="sd">${iso}</p>
  <div class="f-row"><label>${L.name}</label><input id="aT" type="text" placeholder="${L.qPh}"></div>
  <div class="f-grid">
    <div class="f-row"><label>${L.area}</label><select id="aA">${P().areas.map((a,i)=>`<option value="${i}">${esc(a)}</option>`).join("")}</select></div>
    <div class="f-row"><label>${L.minutes}</label><input id="aM" type="number" min="1" value="30"></div>
  </div>
  <div class="f-row"><label>${L.prio}</label><select id="aP">${L.prios.map((p,i)=>`<option value="${i}">${p}</option>`).join("")}</select></div>
  <button class="cta" onclick="createOn('${iso}')">${L.create}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function createOn(iso){ const txt=$("aT").value.trim(); if(!txt){closeSheet();return;}
  P().tasks.push({id:++uid,t:txt,a:+$("aA").value,min:Math.max(1,+$("aM").value||30),d:iso,done:false,p:+$("aP").value});
  closeSheet(); save(); boot(); }

/* ============ Auto-plan & flows ============ */
function autoplan(id){
  const x=P().dls.find(d=>d.id===id); if(!x||x.planned)return;
  const L=t(), steps=L.examFlow;
  const today=new Date(todayISO()+"T12:00"), exam=new Date(x.d+"T12:00");
  const span=Math.max(1,Math.round((exam-today)/86400000)-1);
  steps.forEach((s,i)=>{
    const off=Math.min(span,Math.max(0,Math.round(span*(i/(steps.length-1||1)))));
    P().tasks.push({id:++uid,t:`${s} — ${x.t}`,a:x.a,min:i===steps.length-1?60:40,d:isoPlus(off),done:false,p:1});
  });
  x.planned=true; save(); curTab="week"; weekOff=0; boot();
}
function runFlow(fn){
  const L=t();
  const areaSel=id=>`<select id="${id}">${P().areas.map((a,i)=>`<option value="${i}">${esc(a)}</option>`).join("")}</select>`;
  if(fn==="study"){ sheet(`<h3>${L.flowStudy[1]}</h3><p class="sd">${L.flowStudy[2]}</p>
    <div class="f-row"><label>${L.pickArea}</label>${areaSel("fA")}</div>
    <button class="cta" onclick="applyStudy()">${L.apply}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); return; }
  if(fn==="exam"||fn==="work"){ const f=fn==="exam"?L.flowExam:L.flowWork, def=fn==="exam"?10:14;
    sheet(`<h3>${f[1]}</h3><p class="sd">${f[2]}</p>
    <div class="f-row"><label>${L.dlName}</label><input id="fT2" type="text"></div>
    <div class="f-row"><label>${L.pickArea}</label>${areaSel("fA")}</div>
    <div class="f-row"><label>${L.pickDate}</label><input id="fD" type="date" value="${isoPlus(def)}"></div>
    <button class="cta" onclick="${fn==="exam"?"applyExam()":"applyWork()"}">${L.apply}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); return; }
  if(fn==="rev"){ const now=new Date(); const off=((5-((now.getDay()+6)%7))+7)%7; const iso=isoPlus(off);
    P().areas.forEach((a,i)=>P().tasks.push({id:++uid,t:(S.lang==="el"?"Επανάληψη — ":"Review — ")+a,a:i,min:20,d:iso,done:false,p:0}));
    save(); curTab="week"; weekOff=0; boot(); return; }
  if(fn==="bills"){
    const names=S.lang==="el"?["ΔΕΗ / ρεύμα","Νερό","Κινητό & internet","Κοινόχρηστα"]:["Electricity","Water","Phone & internet","Building fees"];
    const ai=Math.max(0,P().areas.findIndex(a=>/οικονομ|financ/i.test(a)));
    names.forEach(n=>P().tasks.push({id:++uid,t:n,a:ai,min:10,d:todayISO(),done:false,p:1}));
    save(); curTab="today"; boot(); return; }
}
function applyStudy(){ const L=t(),a=+$("fA").value;
  [[L.examFlow[0],30],[L.examFlow[1],45],[L.examFlow[2],20]].forEach(([s,m])=>
    P().tasks.push({id:++uid,t:`${s} — ${P().areas[a]}`,a,min:m,d:todayISO(),done:false,p:1}));
  closeSheet(); save(); curTab="today"; boot(); }
function applyExam(){ const title=$("fT2").value.trim()||t().flowExam[1], a=+$("fA").value, d=$("fD").value||todayISO();
  P().dls.push({id:++uid,t:title,a,d,planned:false});
  closeSheet(); save(); autoplan(P().dls[P().dls.length-1].id); }
function applyWork(){ const L=t(),title=$("fT2").value.trim()||L.flowWork[1], a=+$("fA").value, d=$("fD").value||todayISO();
  P().dls.push({id:++uid,t:title,a,d,planned:true});
  const today=new Date(todayISO()+"T12:00"), due=new Date(d+"T12:00");
  const span=Math.max(1,Math.round((due-today)/86400000)-1);
  L.workFlow.forEach((s,i)=>P().tasks.push({id:++uid,t:`${s} — ${title}`,a,min:60,d:isoPlus(Math.min(span,Math.round(span*(i/(L.workFlow.length-1))))),done:false,p:1}));
  closeSheet(); save(); curTab="week"; weekOff=0; boot(); }

function closeSheet(){ $("sheetOvl").classList.add("hide"); renderMini(); }
$("sheetOvl").addEventListener("click",e=>{ if(e.target.id==="sheetOvl"){ if(F){minimizeFocus();} else closeSheet(); } });

  sheet(`<h3>${L.newProfile}</h3><p class="sd">Panta Duo €24/yr · Family €36/yr</p>

function openDl(){ const L=t();

function openSlot(){ const L=t();
  sheet(`<h3>${L.addSlot}</h3>
  <div class="f-row"><label>${L.name}</label><input id="slN" type="text" placeholder="${L.slotName}"></div>
  <div class="f-row"><label>${L.slotDays}</label><div class="chipset" id="slDays">${t().wk.map((w,i)=>`<button class="pchip" data-i="${i}" onclick="this.classList.toggle('on')">${w}</button>`).join("")}</div></div>

  <button class="cta" onclick="createSlot()">${L.create}</button><button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function createSlot(){ const n=$("slN").value.trim(); if(!n){closeSheet();return;}
  const days=[...document.querySelectorAll("#slDays .pchip.on")].map(b=>+b.dataset.i);
  P().slots.push({id:++uid,n,days:days.length?days:[0],time:$("slT").value.trim()||"—"});

/* ============ Settings ============ */
function openSettings(){ const L=t();
  sheet(`<h3>${L.settings}</h3>
  <div class="f-row"><label>${L.areasH}</label>
    <div class="chipset" style="margin-bottom:9px">${P().areas.map(a=>`<span class="pchip on">${esc(a)}</span>`).join("")}</div>
    <div style="display:flex;gap:8px"><input id="stArea" type="text" placeholder="${L.areaPh}" style="flex:1;border:1.5px solid var(--line2);border-radius:14px;padding:11px 13px;background:var(--card2);outline:none">
    <button class="btn-p" onclick="addArea()">${ic("plus",16)}</button></div></div>
  <button class="ghost" onclick="backup()" style="border:1.5px solid var(--line2);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px">${ic("dl",15)} ${L.backup}</button>
  <button class="dangerb" onclick="resetAll()">${L.resetB}</button>
  <button class="ghost" onclick="closeSheet()">${L.cancel}</button>`); }
function addArea(){ const v=$("stArea").value.trim(); if(v){P().areas.push(v); save();} openSettings(); }
function backup(){ try{
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="panta-backup.json"; a.click();
  }catch(e){} }
function resetAll(){ if(confirm(t().resetQ)){ store.del("panta_v2"); store.del("panta_v1"); location.reload(); } }

/* ============ Start ============ */
if(S){ $("onb").classList.add("hide"); boot(); } else { renderOnb(); }
